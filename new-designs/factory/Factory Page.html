<!DOCTYPE html>
<html lang="en" data-theme="broadcast">
<head>
<meta charset="UTF-8"/>
<title>Factory — R&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
<link rel="stylesheet" href="factory.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="factory-data.js"></script>

<script type="text/babel">
const { useMemo } = React;
const f = window.FACTORY_DATA;

/* ─── Radar hexagon · modern edition ───────────────────── */
function Radar({ axes, peer = [] }) {
  const size = 220, cx = size/2, cy = size/2, R = 86;
  const n = axes.length;
  const pt = (i, r) => {
    const a = (Math.PI*2 * i/n) - Math.PI/2;
    return [cx + Math.cos(a)*r, cy + Math.sin(a)*r];
  };
  const ringPath = (r) => Array.from({length:n},(_,i)=>pt(i,r))
    .map(([x,y],i)=>`${i===0?"M":"L"} ${x} ${y}`).join(" ") + " Z";
  const valPath = axes.map((ax,i) => pt(i, (ax.v/100)*R))
    .map(([x,y],i)=>`${i===0?"M":"L"} ${x} ${y}`).join(" ") + " Z";
  const peerPath = peer.length ? peer.map((v,i) => pt(i, (v/100)*R))
    .map(([x,y],i)=>`${i===0?"M":"L"} ${x} ${y}`).join(" ") + " Z" : null;
  return (
    <svg className="radar-svg" viewBox={`-34 -34 ${size+68} ${size+68}`}>
      <defs>
        <radialGradient id="radarFill" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="var(--sig-red)" stopOpacity="0.35"/>
          <stop offset="100%" stopColor="var(--sig-red)" stopOpacity="0.06"/>
        </radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
      </defs>
      {[0.25,0.5,0.75,1].map(r => <path key={r} d={ringPath(R*r)} fill="none" stroke="var(--line-hair)" strokeWidth="1" strokeDasharray={r===1?"none":"2 3"}/>)}
      {axes.map((_,i) => {
        const [x,y] = pt(i, R);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line-hair)" strokeWidth="1"/>;
      })}
      {peerPath && <path d={peerPath} fill="none" stroke="var(--sig-amber)" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.7"/>}
      <path d={valPath} fill="url(#radarFill)" stroke="var(--sig-red)" strokeWidth="2" filter="url(#glow)" opacity="0.5"/>
      <path d={valPath} fill="none" stroke="var(--sig-red)" strokeWidth="2"/>
      {axes.map((ax,i) => {
        const [lx,ly] = pt(i, R + 22);
        const [vx,vy] = pt(i, (ax.v/100)*R);
        return (
          <g key={i}>
            <text x={lx} y={ly-3} textAnchor="middle" dominantBaseline="middle" style={{
              fontFamily:"var(--font-mono)",fontSize:8.5,letterSpacing:"0.18em",fill:"var(--ink-dim)",fontWeight:600
            }}>{ax.k}</text>
            <text x={lx} y={ly+8} textAnchor="middle" dominantBaseline="middle" style={{
              fontFamily:"var(--font-display)",fontSize:13,fontWeight:800,fill:"var(--ink-hi)",letterSpacing:"-0.02em"
            }}>{ax.v}</text>
            <circle cx={vx} cy={vy} r="3.5" fill="var(--sig-red)" stroke="var(--bg-void)" strokeWidth="1.5"/>
          </g>
        );
      })}
      <circle cx={cx} cy={cy} r="2" fill="var(--ink-dim)"/>
    </svg>
  );
}

function Sparkline() {
  const pts = [72,74,73,76,78,77,80,82,81,84,83,86];
  const W = 160, H = 34;
  const min = 70, max = 90;
  const x = i => (i/(pts.length-1))*W;
  const y = v => H - ((v-min)/(max-min))*H;
  const line = pts.map((v,i)=>`${i===0?"M":"L"} ${x(i)} ${y(v)}`).join(" ");
  const area = `M 0 ${H} L ${pts.map((v,i)=>`${x(i)} ${y(v)}`).join(" L ")} L ${W} ${H} Z`;
  return (
    <svg className="rhs-spark" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="spg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="var(--sig-green)" stopOpacity="0.45"/>
          <stop offset="100%" stopColor="var(--sig-green)" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#spg)"/>
      <path d={line} fill="none" stroke="var(--sig-green)" strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
      <circle cx={x(pts.length-1)} cy={y(pts[pts.length-1])} r="2.5" fill="var(--sig-green)"/>
    </svg>
  );
}

function Dial({ pct, color }) {
  const size = 72, cx = size/2, cy = size/2, r = 28, C = 2*Math.PI*r;
  return (
    <svg className="aero-dial-svg" viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line-hair)" strokeWidth="6"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="6"
        strokeDasharray={`${(pct/100)*C} ${C}`} strokeLinecap="butt"
        transform={`rotate(-90 ${cx} ${cy})`}/>
      <text x={cx} y={cy+4} textAnchor="middle" style={{
        fontFamily:"var(--font-display)",fontSize:18,fontWeight:800,fill:"var(--ink-hi)",letterSpacing:"-0.02em"
      }}>{Math.round(pct)}</text>
    </svg>
  );
}

function PuRow({ row }) {
  const dots = [];
  const warn = row.used >= row.limit - 1;
  const danger = row.used >= row.limit;
  for (let i = 0; i < row.limit; i++) {
    const isUsed = i < row.used;
    const cls = isUsed ? `used ${danger ? "danger" : warn && i === row.used-1 ? "warn" : ""}` : "";
    dots.push(<span key={i} className={`pu-dot ${cls}`}/>);
  }
  const remaining = row.limit - row.used;
  return (
    <div>
      <div className="pu-row">
        <span className="pk">{row.k}</span>
        <div className="pu-dots">{dots}</div>
        <span className="pv" style={{color: danger ? "var(--sig-red)" : warn ? "var(--sig-amber)" : "var(--ink-hi)"}}>
          {remaining}
          <span className="plim">{row.used}/{row.limit} USED</span>
        </span>
      </div>
      {danger && <div className="pu-penalty">⚠ GRID PENALTY ON NEXT CHANGE</div>}
    </div>
  );
}

function TechNode({ u, branchColor }) {
  const deltas = Object.entries(u.delta);
  const disabled = u.status === "locked";
  return (
    <div className={`tn ${u.status} ${u.td ? "td-pick" : ""}`}>
      <div className="tn-top">
        <div className="tn-name">
          {u.status === "complete" && <span className="check">✓</span>}
          {u.name}
        </div>
        <div style={{display:"flex",gap:6,flexDirection:"column",alignItems:"flex-end"}}>
          <span className={`tn-status ${u.status}`}>{u.status.replace("-"," ")}</span>
          {u.td && <span className="tn-td">TD PICK</span>}
        </div>
      </div>

      <div className="tn-desc">{u.desc}</div>

      <div className="tn-deltas">
        {deltas.map(([k,v]) => (
          <span key={k} className={`tn-delta ${v > 0 ? "pos" : "neg"}`}>
            {k}: {v > 0 ? "+" : ""}{v}
          </span>
        ))}
      </div>

      {(u.status === "in-progress" || u.status === "complete") && (
        <div className="tn-prog-wrap">
          <div className="tn-prog-label">
            <span>PROGRESS · {u.prog}%</span>
            {u.status === "in-progress" && <span className="eta">ETA {Math.ceil(((100-u.prog)/100)*u.races)} RACES</span>}
            {u.status === "complete" && <span style={{color:"var(--sig-green)"}}>DEPLOYED</span>}
          </div>
          <div className="tn-prog-track">
            <div className={`fill ${u.status === "complete" ? "complete" : ""}`} style={{transform:`scaleX(${u.prog/100})`}}/>
          </div>
        </div>
      )}

      <div className="tn-foot">
        <div className="tn-cost">
          <span><span className="c-val">${u.cost.toFixed(1)}M</span></span>
          <span className="c-sep">·</span>
          <span><span className="c-val">{u.races}</span> RACES</span>
        </div>
        {u.status === "available" && <button className="tn-btn start">START →</button>}
        {u.status === "in-progress" && <button className="tn-btn pause">PAUSE</button>}
        {u.status === "queued" && <button className="tn-btn ghost">QUEUED</button>}
        {u.status === "locked" && <button className="tn-btn ghost">LOCKED</button>}
        {u.status === "complete" && <button className="tn-btn ghost">DEPLOYED</button>}
      </div>
    </div>
  );
}

function App() {
  const branches = [
    { name: "CHASSIS",     color: "var(--sig-green)" },
    { name: "POWER UNIT",  color: "var(--sig-cyan)" },
    { name: "ACTIVE AERO", color: "var(--sig-purple)" },
  ];
  const remainBudget = f.team.cap - f.team.spent;
  return (
    <div className="factory-wrap">
      {/* HEADER STRIP */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:18,paddingBottom:14,borderBottom:"1px solid var(--line-sub)"}}>
        <div>
          <div className="label" style={{color:"var(--sig-red)",fontWeight:700}}>◉ FACTORY · MILTON KEYNES · ROUND {f.team.round}</div>
          <div style={{fontFamily:"var(--font-display)",fontWeight:800,fontSize:40,color:"var(--ink-hi)",letterSpacing:"-0.03em",lineHeight:1,marginTop:4,whiteSpace:"nowrap"}}>
            R&amp;D Command
          </div>
        </div>
        <div style={{display:"flex",gap:24,fontFamily:"var(--font-mono)",fontSize:11,color:"var(--ink-mute)",letterSpacing:"0.14em"}}>
          <div><div className="label label-dim">BUDGET CAP</div><div style={{fontSize:18,color:"var(--ink-hi)",fontWeight:700,marginTop:2}}>${f.team.cap}M</div></div>
          <div><div className="label label-dim">SPENT</div><div style={{fontSize:18,color:"var(--sig-amber)",fontWeight:700,marginTop:2}}>${f.team.spent}M</div></div>
          <div><div className="label label-dim">REMAINING</div><div style={{fontSize:18,color:"var(--sig-green)",fontWeight:700,marginTop:2}}>${remainBudget.toFixed(1)}M</div></div>
        </div>
      </div>

      {/* HERO — radar / pu / aero */}
      <div className="fac-hero">
        <div className="fac-panel radar-card">
          <div className="radar-hero-strip">
            <div className="rhs-big">
              {f.car.rating}
              <span className="u">CAR PERFORMANCE · OVR</span>
            </div>
            <div className="rhs-vs"/>
            <div className="rhs-trend">
              <span className="tk">6-RACE TREND</span>
              <span className="tv">+14 pts</span>
              <Sparkline/>
            </div>
            <div className="rhs-rank">
              <div className="rnum">P3</div>
              <span className="rsub">PEER RANK</span>
            </div>
          </div>
          <div className="radar-body">
            <Radar axes={f.car.axes} peer={[72,68,74,70,66,71]}/>
            <div className="radar-axes">
              {f.car.axes.map((a,i) => {
                const peer = [72,68,74,70,66,71][i] || 70;
                const delta = a.v - peer;
                return (
                  <div key={a.k} className="radar-axis-row" style={{"--peer": `${peer}%`}}>
                    <span className="rk">{a.k}</span>
                    <div className="radar-axis-bar"><div className="fill" style={{transform:`scaleX(${a.v/100})`}}/></div>
                    <span className="rv">
                      {a.v}
                      <span className={`rdelta ${delta >= 0 ? "up" : "dn"}`}>{delta >= 0 ? "+" : ""}{delta} vs peer</span>
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="radar-foot">
            <div className="radar-foot-cell">
              <span className="k">Last Upgrade</span>
              <span className="v">R06</span>
            </div>
            <div className="radar-foot-cell">
              <span className="k">Δ vs Leader</span>
              <span className="v dn">−0.21s</span>
            </div>
            <div className="radar-foot-cell">
              <span className="k">Reliability MTBF</span>
              <span className="v up">18.4 laps</span>
            </div>
          </div>
        </div>

        <div className="fac-panel pu-card">
          <div className="pu-hero-strip">
            <div className="pu-hero-big">
              {f.pu.reduce((a,r)=>a+(r.limit-r.used),0)}
              <span className="u">COMPONENTS REMAINING</span>
            </div>
            <div className="pu-hero-health">
              <span className="k">Fleet Health</span>
              <span className={`v ${f.pu.some(r=>r.used>=r.limit) ? "danger" : f.pu.some(r=>r.used>=r.limit-1) ? "warn" : ""}`}>
                {f.pu.some(r=>r.used>=r.limit) ? "CRITICAL" : f.pu.some(r=>r.used>=r.limit-1) ? "AT RISK" : "NOMINAL"}
              </span>
            </div>
            <div className="pu-hero-next">
              NEXT CHANGE
              <span className="rd">R08 · ICE</span>
            </div>
          </div>
          <div className="fac-phead" style={{borderTop:"none",background:"transparent",paddingTop:10}}>
            <div className="t">Power Unit Allocation</div>
            <div className="s">SEASON · 24 RACES</div>
          </div>
          <div className="pu-body">
            {f.pu.map(row => <PuRow key={row.k} row={row}/>)}
          </div>
          <div className="pu-foot">
            <div className="pu-foot-cell">
              <span className="k">Penalties Taken</span>
              <span className="v">0</span>
            </div>
            <div className="pu-foot-cell">
              <span className="k">Projected Grid Loss</span>
              <span className="v danger">−5 PL</span>
            </div>
          </div>
        </div>

        <div className="fac-panel aero-card">
          <div className="aero-hero-strip">
            <div className="aero-hero-stat wt">
              <span className="k">Wind Tunnel</span>
              <span className="v">{f.aero.wtUsed}<span className="u">/ {f.aero.wtLimit}h</span></span>
            </div>
            <div className="aero-hero-stat cfd">
              <span className="k">CFD Runs</span>
              <span className="v">{f.aero.cfdUsed}<span className="u">/ {f.aero.cfdLimit}</span></span>
            </div>
            <div className="aero-hero-clock">
              <span className="k">Window Resets</span>
              <span className="v">D−09</span>
              <span className="d">JUN 24 · 00:00 UTC</span>
            </div>
          </div>
          <div className="fac-phead" style={{borderTop:"none",background:"transparent",paddingTop:10}}>
            <div className="t">Aero Testing</div>
            <div className="s">CDT WINDOW · 14 DAYS</div>
          </div>
          <div className="aero-body">
            <div className="aero-metric" style={{"--fill":"var(--sig-cyan)"}}>
              <div className="aero-metric-head">
                <span className="k"><span className="swatch" style={{background:"var(--sig-cyan)"}}/>Wind Tunnel Utilization</span>
                <span className="tag">DAILY BOOKINGS</span>
              </div>
              <div className="aero-days">
                {[0.9,0.7,0.85,0.6,0.95,0.4,0,0.8,0.75,0.9,0.55,0,0,0].map((v,i)=>{
                  const today = i === 5;
                  const future = i > 5;
                  return (
                    <div key={i} className={`aero-day ${today?"today":""} ${future?"future":""}`}>
                      {v > 0 && <div className="aero-day-fill" style={{height: `${v*100}%`}}/>}
                    </div>
                  );
                })}
              </div>
              <div className="aero-bar-stack">
                <div className="aero-bar-used" style={{width: `${(f.aero.wtUsed/f.aero.wtLimit)*100}%`}}/>
                <div className="aero-bar-remaining"/>
              </div>
              <div className="aero-readout">
                <span className="big">{(f.aero.wtLimit-f.aero.wtUsed).toFixed(1)}<span className="u">h left</span></span>
                <span className="d">≈ {Math.round((f.aero.wtLimit-f.aero.wtUsed)/1.8)} sessions remaining</span>
                <span className="pct">{Math.round((f.aero.wtUsed/f.aero.wtLimit)*100)}%</span>
              </div>
            </div>
            <div className="aero-metric" style={{"--fill":"var(--sig-purple)"}}>
              <div className="aero-metric-head">
                <span className="k"><span className="swatch" style={{background:"var(--sig-purple)"}}/>CFD Compute</span>
                <span className="tag">TFLOP-HRS</span>
              </div>
              <div className="aero-days">
                {[0.6,0.8,0.9,1.0,0.7,0.5,0,0.85,0.6,0.9,0.75,0,0,0].map((v,i)=>{
                  const today = i === 5;
                  const future = i > 5;
                  return (
                    <div key={i} className={`aero-day ${today?"today":""} ${future?"future":""}`}>
                      {v > 0 && <div className="aero-day-fill" style={{height: `${v*100}%`}}/>}
                    </div>
                  );
                })}
              </div>
              <div className="aero-bar-stack">
                <div className="aero-bar-used" style={{width: `${(f.aero.cfdUsed/f.aero.cfdLimit)*100}%`}}/>
                <div className="aero-bar-remaining"/>
              </div>
              <div className="aero-readout">
                <span className="big">{(f.aero.cfdLimit-f.aero.cfdUsed).toFixed(0)}<span className="u">runs left</span></span>
                <span className="d">queue depth: 3 · avg 42m per run</span>
                <span className="pct">{Math.round((f.aero.cfdUsed/f.aero.cfdLimit)*100)}%</span>
              </div>
            </div>
          </div>
          <div className="aero-foot">
            <div className="aero-foot-cell">
              <span className="k">ATR Coefficient</span>
              <span className="v">0.90×</span>
            </div>
            <div className="aero-foot-cell">
              <span className="k">Correlation Δ</span>
              <span className="v cyan">+2.1%</span>
            </div>
            <div className="aero-foot-cell">
              <span className="k">Next Delivery</span>
              <span className="v purple">R09</span>
            </div>
          </div>
        </div>
      </div>

      {/* R&D QUEUE */}
      <div className="rd-head">
        <div>
          <div className="rd-t">R&D Pipeline</div>
          <div className="rd-s">15 UPGRADES · 3 BRANCHES · 1 ACTIVE · 3 QUEUED</div>
        </div>
        <div className="rd-right">
          <div className="label label-dim">NEXT DELIVERY</div>
          <div className="b" style={{fontSize:14,marginTop:2}}>FLOOR UPGRADE · R09 HUNGARORING</div>
        </div>
      </div>

      <div className="rd-queue">
        <div className="rd-queue-rows">
          <div className="rd-queue-col-labels">
            <div>#</div><div>UPGRADE</div><div>BRANCH</div><div style={{textAlign:"right"}}>ETA</div><div style={{textAlign:"right"}}>PROGRESS</div>
          </div>
          {f.queue.map((q,i) => (
            <div key={q.id} className="rdq-row">
              <div className="rdq-idx">{String(i+1).padStart(2,"0")}</div>
              <div className="rdq-name">{q.name}</div>
              <div className="rdq-branch">{q.branch}</div>
              <div className="rdq-eta" style={{justifyContent:"flex-end"}}>R{(f.team.round + q.eta).toString().padStart(2,"0")}</div>
              <div className="rdq-bar">
                <div className="rdq-bar-track"><div className="fill" style={{transform:`scaleX(${q.pct/100})`}}/></div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* TECH TREE */}
      <div className="tree-grid">
        {branches.map(b => {
          const items = f.upgrades[b.name];
          const activeCount = items.filter(u => u.status === "in-progress").length;
          return (
            <div key={b.name} className="branch-col">
              <div className="branch-head" style={{"--branch-color": b.color}}>
                <span className="bname">{b.name}</span>
                <span className="bcount">{items.filter(u=>u.status==="complete").length}/{items.length}</span>
                <span className="bsub">{activeCount ? "◉ ACTIVE" : "STANDBY"}</span>
              </div>
              {items.map(u => <TechNode key={u.id} u={u} branchColor={b.color}/>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

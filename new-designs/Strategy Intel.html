<!DOCTYPE html>
<html lang="en" data-theme="broadcast">
<head>
<meta charset="UTF-8"/>
<title>Strategy — Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
<link rel="stylesheet" href="pages.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="atoms.jsx"></script>

<script type="text/babel">
const g = window.RACE_DATA;

function NavBar({ current }) {
  const links = [["index.html","Hub"],["Strategy Pre-Race.html","Pre-Race"],["Strategy Planner.html","Planner"],["Strategy Page.html","Live"],["Strategy Intel.html","Intel"],["Strategy Post-Race.html","Post"]];
  return (
    <div className="phase-switcher" style={{bottom:20,left:20}}>
      {links.map(([h,l])=>(<a key={h} href={h} style={{textDecoration:"none"}}><button className={current===l?"active":""}>{l}</button></a>))}
    </div>
  );
}

// Deg curves — lap-time penalty vs tire age per compound
function DegChart() {
  const data = {
    S: Array.from({length:30},(_,i)=> i < 12 ? i*0.08 : 0.96 + (i-12)*0.35),
    M: Array.from({length:36},(_,i)=> i < 22 ? i*0.055 : 1.21 + (i-22)*0.25),
    H: Array.from({length:45},(_,i)=> i < 36 ? i*0.035 : 1.26 + (i-36)*0.18),
  };
  const W = 800, H = 240, PAD = 36;
  const xMax = 45, yMax = 4;
  const x = l => PAD + (l/xMax)*(W-PAD-10);
  const y = v => H-PAD - (v/yMax)*(H-PAD-10);
  const path = arr => arr.map((v,i)=>`${i===0?"M":"L"} ${x(i)} ${y(v)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"260px"}}>
      {/* grid */}
      {[0,1,2,3,4].map(v=>(
        <g key={v}>
          <line x1={PAD} y1={y(v)} x2={W-10} y2={y(v)} className="chart-grid-line"/>
          <text x={PAD-6} y={y(v)+3} textAnchor="end" className="chart-axis-text">+{v}s</text>
        </g>
      ))}
      {[0,10,20,30,40].map(v=>(
        <g key={v}>
          <line x1={x(v)} y1={H-PAD} x2={x(v)} y2={PAD} className="chart-grid-line" opacity="0.4"/>
          <text x={x(v)} y={H-PAD+14} textAnchor="middle" className="chart-axis-text">L{v}</text>
        </g>
      ))}
      <line x1={PAD} y1={H-PAD} x2={W-10} y2={H-PAD} className="chart-axis"/>
      <line x1={PAD} y1={H-PAD} x2={PAD} y2={PAD} className="chart-axis"/>

      <path d={path(data.H)} className="chart-curve h"/>
      <path d={path(data.M)} className="chart-curve m"/>
      <path d={path(data.S)} className="chart-curve s"/>

      {/* cliff markers */}
      <line x1={x(12)} y1={y(0.96)} x2={x(12)} y2={H-PAD} stroke="var(--c-soft)" strokeDasharray="3 3" opacity="0.5"/>
      <text x={x(12)} y={PAD+10} className="chart-axis-text" textAnchor="middle" fill="var(--c-soft)">S CLIFF L12</text>
      <line x1={x(22)} y1={y(1.21)} x2={x(22)} y2={H-PAD} stroke="var(--c-med)" strokeDasharray="3 3" opacity="0.5"/>
      <text x={x(22)} y={PAD+10} className="chart-axis-text" textAnchor="middle" fill="var(--c-med)">M CLIFF L22</text>
      <line x1={x(36)} y1={y(1.26)} x2={x(36)} y2={H-PAD} stroke="var(--c-hard)" strokeDasharray="3 3" opacity="0.5"/>
      <text x={x(36)} y={PAD+10} className="chart-axis-text" textAnchor="middle" fill="var(--c-hard)">H CLIFF L36</text>
    </svg>
  );
}

function RainRadar() {
  // 90-min forecast, rain probability %
  const W = 800, H = 160, PAD = 28;
  const minutes = 90;
  const probs = Array.from({length:19},(_,i)=>{
    const t = i*5;
    return Math.max(0, 12 + Math.sin(t/12)*8 + (t > 50 ? (t-50)*1.6 : 0));
  });
  const x = t => PAD + (t/minutes)*(W-PAD-10);
  const y = p => H - 20 - (p/100)*(H-50);
  const area = probs.map((p,i)=>({t:i*5,p}));
  const areaPath = `M ${x(0)} ${H-20} ` + area.map(d=>`L ${x(d.t)} ${y(d.p)}`).join(" ") + ` L ${x(minutes)} ${H-20} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="rain-chart">
      <defs>
        <linearGradient id="rg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="var(--sig-cyan)" stopOpacity="0.6"/>
          <stop offset="100%" stopColor="var(--sig-cyan)" stopOpacity="0.05"/>
        </linearGradient>
      </defs>
      {/* grid */}
      {[0,25,50,75,100].map(v=>(
        <g key={v}>
          <line x1={PAD} y1={y(v)} x2={W-10} y2={y(v)} className="chart-grid-line"/>
          <text x={PAD-6} y={y(v)+3} textAnchor="end" className="chart-axis-text">{v}%</text>
        </g>
      ))}
      {[0,15,30,45,60,75,90].map(t=>(
        <g key={t}>
          <line x1={x(t)} y1={H-20} x2={x(t)} y2={20} className="chart-grid-line" opacity="0.3"/>
          <text x={x(t)} y={H-6} textAnchor="middle" className="chart-axis-text">+{t}m</text>
        </g>
      ))}
      <path d={areaPath} fill="url(#rg)"/>
      <path d={`M ${area.map(d=>`${x(d.t)} ${y(d.p)}`).join(" L ")}`} fill="none" stroke="var(--sig-cyan)" strokeWidth="2"/>
      {/* threshold */}
      <line x1={PAD} y1={y(40)} x2={W-10} y2={y(40)} stroke="var(--sig-amber)" strokeDasharray="4 4" strokeWidth="1.5"/>
      <text x={W-20} y={y(40)-4} textAnchor="end" className="chart-axis-text" fill="var(--sig-amber)">INTER THRESHOLD</text>
    </svg>
  );
}

function GripCurve() {
  const W = 600, H = 140, PAD = 30;
  // Grip 0-100 over session 0-90 min, rises with rubber
  const data = Array.from({length:19},(_,i)=>{
    const t = i*5;
    return 72 + (1-Math.exp(-t/40))*22 - Math.max(0,(t-70)*0.2);
  });
  const x = t => PAD + (t/90)*(W-PAD-10);
  const y = v => H-22 - ((v-60)/40)*(H-40);
  const path = `M ${data.map((v,i)=>`${x(i*5)} ${y(v)}`).join(" L ")}`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="grip-svg">
      <line x1={PAD} y1={H-22} x2={W-10} y2={H-22} className="chart-axis"/>
      <line x1={PAD} y1={H-22} x2={PAD} y2={20} className="chart-axis"/>
      {[60,75,90].map(v=>(<g key={v}><line x1={PAD} y1={y(v)} x2={W-10} y2={y(v)} className="chart-grid-line"/><text x={PAD-6} y={y(v)+3} textAnchor="end" className="chart-axis-text">{v}</text></g>))}
      {[0,30,60,90].map(t=>(<text key={t} x={x(t)} y={H-6} textAnchor="middle" className="chart-axis-text">+{t}m</text>))}
      <path d={path} fill="none" stroke="var(--sig-green)" strokeWidth="2"/>
      <text x={W-10} y={y(data[data.length-1])-6} textAnchor="end" className="chart-axis-text" fill="var(--sig-green)">GRIP {data[data.length-1].toFixed(0)}</text>
    </svg>
  );
}

function CompRow({ t, pace, threat, isPlayer }) {
  const team = window.teamOf(t.team);
  const faster = pace < 0;
  const pct = Math.min(Math.abs(pace) * 60, 48);
  return (
    <div className={`comp-row ${isPlayer ? "player" : ""}`}>
      <div className="comp-pos">{t.pos}</div>
      <div className="comp-team" style={{background: team.color}}/>
      <div className="comp-code">{t.code}</div>
      <div className="mono" style={{fontSize:10,color:"var(--ink-mute)"}}>{team.name.toUpperCase()}</div>
      <div className="comp-threat">
        {[0,1,2,3,4].map(i => <span key={i} className={`dot ${i < threat ? "on" : ""}`}/>)}
      </div>
      <div className={`comp-pace-bar ${faster ? "faster" : ""}`}>
        <div className="fill" style={{width:`${pct}%`}}/>
      </div>
      <div className="mono" style={{fontSize:11, color: faster ? "var(--sig-green)" : "var(--sig-red)", textAlign:"right", fontWeight:700}}>
        {faster ? "" : "+"}{pace.toFixed(2)}s
      </div>
    </div>
  );
}

function App() {
  const comps = [
    { t: g.timing[1], pace: -0.08, threat: 5 },
    { t: g.timing[2], pace: -0.12, threat: 3 },
    { t: g.timing[3], pace: +0.05, threat: 2 },
    { t: g.timing[4], pace: +0.11, threat: 2 },
    { t: g.timing[5], pace: +0.02, threat: 4, isPlayer: true },
    { t: g.timing[6], pace: -0.22, threat: 4 },
    { t: g.timing[7], pace: +0.18, threat: 1 },
  ];
  return (
    <div className="shell">
      <TopBar speed={1} setSpeed={()=>{}} paused={true} setPaused={()=>{}}/>
      <FlagStrip flag="GREEN" weather={g.weather}/>

      <div className="planner-head" style={{marginTop:14}}>
        <div className="planner-title-card">
          <div className="planner-k">Race Intelligence</div>
          <div className="planner-t">Intel Desk</div>
          <div className="planner-desc">Live telemetry · tyre-deg curves · rivals · weather · grip evolution</div>
        </div>
        <div className="panel">
          <div className="weather-grid">
            <div className="w-cell"><div className="k">Rain (60m)</div><div className="v mono">{g.weather.rainProb}<span className="u">%</span></div></div>
            <div className="w-cell"><div className="k">Grip Idx</div><div className="v mono" style={{color:"var(--sig-green)"}}>HIGH</div></div>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:14,marginBottom:14}}>
        <div className="chart-wrap">
          <div className="chart-head">
            <div className="ph-title">Tyre Degradation · Lap Time Penalty</div>
            <div className="chart-legend">
              <span className="cl-item"><span className="cl-sw" style={{background:"var(--c-soft)"}}/>SOFT</span>
              <span className="cl-item"><span className="cl-sw" style={{background:"var(--c-med)"}}/>MEDIUM</span>
              <span className="cl-item"><span className="cl-sw" style={{background:"var(--c-hard)"}}/>HARD</span>
            </div>
          </div>
          <div className="chart-body"><DegChart/></div>
        </div>
        <div className="radar-wrap">
          <div className="chart-head"><div className="ph-title">◉ Weather Radar · 90-min</div><div className="chart-legend"><span style={{color:"var(--sig-cyan)"}}>━━ RAIN PROB</span></div></div>
          <div className="radar-body"><RainRadar/></div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div className="panel">
          <div className="panel-head"><div className="ph-title">Competitor Analysis</div><div className="ph-sub">PACE Δ PER LAP</div></div>
          <div style={{padding:"8px 0 0"}} className="comp-list">
            <div className="comp-row" style={{fontSize:9,letterSpacing:"0.16em",color:"var(--ink-dim)",textTransform:"uppercase",borderBottom:"1px solid var(--line-sub)"}}>
              <div>P</div><div></div><div>DRV</div><div>TEAM</div><div>THREAT</div><div style={{textAlign:"center"}}>PACE DELTA</div><div style={{textAlign:"right"}}>±s</div>
            </div>
            {comps.map((c,i)=><CompRow key={i} {...c}/>)}
          </div>
        </div>
        <div className="grip-card">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div className="ph-title">Track Evolution · Grip Index</div>
            <div className="label">+22 PTS SINCE FP1 OPEN</div>
          </div>
          <GripCurve/>
          <div className="label label-dim" style={{marginTop:10}}>RUBBER LAYING · DRY LINE ESTABLISHED · PEAK EXPECTED 70m INTO RACE</div>
        </div>
      </div>

      <NavBar current="Intel"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

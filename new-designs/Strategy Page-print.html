<!DOCTYPE html>
<html lang="en" data-theme="broadcast">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Strategy — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
<style>
  @page { size: 1760px 1200px; margin: 0; }

  html, body {
    background: var(--bg-void) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }

  /* Hide interactive chrome in print */
  #tweaks, .phase-switcher { display: none !important; }

  /* Stop animations so print is stable */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }

  /* Stack pages */
  .page {
    width: 1760px;
    min-height: 1190px;
    page-break-after: always;
    break-after: page;
    position: relative;
    overflow: hidden;
    padding: 0;
  }
  .page:last-child {
    page-break-after: auto;
    break-after: auto;
  }

  /* Make sure shell doesn't have weird overflow clipping */
  .shell { max-width: none; padding: 14px 18px 22px; }

  /* Ticker: freeze instead of scrolling */
  .ticker-track {
    animation: none !important;
    transform: none !important;
  }
  .ticker { overflow: hidden; }

  /* Feed/timing: no scroll in print — show all */
  .feed { max-height: none !important; overflow: visible !important; }

  /* Live view — keep 3-col grid so it prints big */
  .main-grid { grid-template-columns: 440px 1fr 360px !important; }

  @media print {
    body { margin: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="hero-timing.jsx"></script>
<script type="text/babel" src="map-strategy.jsx"></script>
<script type="text/babel" src="phases.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function LiveRaceView() {
  const g = window.RACE_DATA;
  const [speed] = useState(1);
  const [paused] = useState(true);
  const lap = g.session.currentLap;
  return (
    <div className="shell" data-screen-label="Live Race">
      <TopBar speed={speed} setSpeed={()=>{}} paused={paused} setPaused={()=>{}}/>
      <FlagStrip flag="GREEN" weather={g.weather}/>
      <HeroStrip lap={lap} totalLaps={g.session.totalLaps}/>
      <div className="main-grid">
        <div><TimingTower timing={g.timing}/></div>
        <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
          <CircuitMap lap={lap} totalLaps={g.session.totalLaps} paused={true} speed={0}/>
          <StrategyPanel/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
          <WeatherPanel/>
          <BattlesPanel/>
          <FeedPanel/>
        </div>
      </div>
    </div>
  );
}

function Shell({ flag = "GREEN", label, children }) {
  return (
    <div className="shell" data-screen-label={label}>
      <TopBar speed={1} setSpeed={()=>{}} paused={true} setPaused={()=>{}}/>
      <FlagStrip flag={flag} weather={window.RACE_DATA.weather}/>
      {children}
    </div>
  );
}

function App() {
  return (
    <>
      <div className="page"><Shell label="Pre-Race"><PreRaceView/></Shell></div>
      <div className="page"><Shell label="Start"><StartScreen/></Shell></div>
      <div className="page"><LiveRaceView/></div>
      <div className="page"><Shell flag="RED" label="Post-Race"><PostRaceView/></Shell></div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// Auto-print once fonts + JSX + layout are ready
(async () => {
  try { if (document.fonts?.ready) await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 1200));
  window.print();
})();
</script>
</body>
</html>

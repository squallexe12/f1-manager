<!DOCTYPE html>
<html lang="en" data-theme="broadcast">
<head>
<meta charset="UTF-8"/>
<title>Strategy — Pre-Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
<link rel="stylesheet" href="pages.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="atoms.jsx"></script>

<script type="text/babel">
const { useState } = React;
const g = window.RACE_DATA;

function NavBar({ current }) {
  const links = [
    ["index.html", "Hub"],
    ["Strategy Pre-Race.html", "Pre-Race"],
    ["Strategy Planner.html", "Planner"],
    ["Strategy Page.html", "Live"],
    ["Strategy Intel.html", "Intel"],
    ["Strategy Post-Race.html", "Post"],
  ];
  return (
    <div className="phase-switcher" style={{bottom: 20, left: 20}}>
      {links.map(([href, label]) => (
        <a key={href} href={href} style={{textDecoration:"none"}}>
          <button className={current === label ? "active" : ""}>{label}</button>
        </a>
      ))}
    </div>
  );
}

function Sessions() {
  return (
    <div className="session-row" style={{marginBottom:14}}>
      <div className="session-card done">
        <div className="session-k">Friday · 60 min</div>
        <div className="session-t">FP1</div>
        <div className="session-time">0:58:42 / 60:00</div>
        <div className="session-progbar"><div className="session-progbar-fill" style={{width:"100%"}}/></div>
        <div className="session-fastest">
          <span className="k">FASTEST</span>
          <span className="v">VSK · 1:19.104</span>
        </div>
      </div>
      <div className="session-card active">
        <div className="session-k">Friday · 60 min</div>
        <div className="session-t">FP2</div>
        <div className="session-time">0:24:12 / 60:00</div>
        <div className="session-progbar"><div className="session-progbar-fill" style={{width:"40%"}}/></div>
        <div className="session-fastest">
          <span className="k">BEST SO FAR</span>
          <span className="v">OSR · 1:18.880</span>
        </div>
      </div>
      <div className="session-card">
        <div className="session-k">Saturday · 60 min</div>
        <div className="session-t">FP3</div>
        <div className="session-time">Scheduled 10:30 LOCAL</div>
        <div className="session-progbar"><div className="session-progbar-fill" style={{width:"0%"}}/></div>
        <div className="session-fastest">
          <span className="k">STATUS</span>
          <span className="v" style={{color:"var(--ink-dim)"}}>PENDING</span>
        </div>
      </div>
    </div>
  );
}

function Programs() {
  const programs = [
    { id:"race", ic:"R", name:"Race Pace", desc:"Long runs to calibrate tyre-deg and fuel behaviour across compounds.", laps:"15–20 LAPS" },
    { id:"quali", ic:"Q", name:"Qualifying Sim", desc:"Low-fuel hot laps. Optimise single-lap performance on softs.", laps:"3–5 RUNS" },
    { id:"tyre", ic:"T", name:"Tyre Test", desc:"Evaluate all three compounds to find the optimal strategy window.", laps:"ALL COMPOUNDS" },
    { id:"setup", ic:"S", name:"Setup Work", desc:"Adjust aero balance between understeer and oversteer.", laps:"MULTI-SESSION" },
  ];
  const [active, setActive] = useState("race");
  return (
    <div className="prog-grid">
      {programs.map(p => (
        <button key={p.id} className={`prog-card ${active === p.id ? "active" : ""}`} onClick={() => setActive(p.id)}>
          <div className="prog-ic">{p.ic}</div>
          <div className="prog-name">{p.name}</div>
          <div className="prog-desc">{p.desc}</div>
          <div className="prog-laps">{p.laps}</div>
        </button>
      ))}
    </div>
  );
}

function Setup() {
  const items = [
    { k:"Front Wing", lo:"LOW DF", hi:"HIGH DF", v: 34, u:"7/10" },
    { k:"Rear Wing",  lo:"LOW DF", hi:"HIGH DF", v: 40, u:"6/10" },
    { k:"Suspension", lo:"SOFT",   hi:"STIFF",   v: -20, u:"4/10" },
    { k:"Brake Bias", lo:"REAR",   hi:"FRONT",   v: 16, u:"55%" },
    { k:"Diff On",    lo:"OPEN",   hi:"LOCKED",  v: 30, u:"7/10" },
    { k:"Diff Off",   lo:"OPEN",   hi:"LOCKED",  v: -10, u:"4/10" },
  ];
  return (
    <div className="panel">
      <div className="panel-head">
        <div className="ph-title">Car Setup · #16 V. Stern</div>
        <div className="ph-sub">BALANCE: NEUTRAL</div>
      </div>
      <div style={{padding:16}} className="setup-grid">
        {items.map(it => (
          <div key={it.k} className="setup-item">
            <div className="setup-row"><span className="sr-k">{it.k}</span><span className="sr-v mono">{it.u}</span></div>
            <div className="setup-track">
              <div className="ticks">{Array.from({length:11}).map((_,i)=><span key={i}/>)}</div>
              <div className="mid"/>
              <div className="fill" style={{width: `${Math.abs(it.v)}%`, left: it.v < 0 ? `calc(50% - ${Math.abs(it.v)}%)` : "50%"}}/>
            </div>
            <div className="setup-ends"><span>{it.lo}</span><span>{it.hi}</span></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <div className="shell">
      <TopBar speed={1} setSpeed={()=>{}} paused={true} setPaused={()=>{}}/>
      <FlagStrip flag="GREEN" weather={g.weather}/>

      <div className="planner-head" style={{marginTop:14}}>
        <div className="planner-title-card">
          <div className="planner-k">Round {g.circuit.round} · Race Weekend · Practice</div>
          <div className="planner-t">MONTERRA GP</div>
          <div className="planner-desc">FP1 complete · FP2 in progress · FP3 Saturday 10:30 · Qualifying 16:00 · Race Sunday 15:00</div>
        </div>
        <div className="panel">
          <div className="weather-grid">
            <div className="w-cell"><div className="k">Air</div><div className="v mono">{g.weather.air}<span className="u">°C</span></div></div>
            <div className="w-cell"><div className="k">Track</div><div className="v mono" style={{color:"var(--sig-amber)"}}>{g.weather.track}<span className="u">°C</span></div></div>
            <div className="w-cell"><div className="k">Rain</div><div className="v mono">{g.weather.rainProb}<span className="u">%</span></div></div>
            <div className="w-cell"><div className="k">Wind</div><div className="v mono" style={{fontSize:"12px"}}>{g.weather.wind}</div></div>
          </div>
        </div>
      </div>

      <h3 className="label" style={{marginBottom:10}}>Sessions</h3>
      <Sessions/>

      <h3 className="label" style={{marginBottom:10,marginTop:8}}>Practice Programs</h3>
      <Programs/>

      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:14,marginTop:14}}>
        <Setup/>
        <div className="panel">
          <div className="panel-head"><div className="ph-title">Race Intelligence</div><div className="ph-sub">OpenF1 · 2024</div></div>
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <div className="label" style={{marginBottom:8}}>Expected Stint Length</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {[["SOFT","S",18,"var(--c-soft)"],["MEDIUM","M",28,"var(--c-med)"],["HARD","H",42,"var(--c-hard)"]].map(([n,l,laps,c]) => (
                  <div key={n} style={{border:`1px solid var(--line-sub)`,padding:"10px 12px",borderLeft:`3px solid ${c}`}}>
                    <div className="label">{n}</div>
                    <div className="display mono" style={{fontSize:20,fontWeight:700,color:"var(--ink-hi)"}}>{laps}<span style={{color:"var(--ink-dim)",fontSize:11,marginLeft:4}}>LAPS</span></div>
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div className="label" style={{marginBottom:8}}>Pit-Lane Loss</div>
              <div className="display mono" style={{fontSize:26,fontWeight:800,color:"var(--ink-hi)"}}>~22.4s</div>
              <div className="label label-dim" style={{marginTop:2}}>RANGE 21.8s – 23.1s</div>
            </div>
            <div>
              <div className="label" style={{marginBottom:6}}>Overtake Difficulty</div>
              <div style={{fontSize:12,color:"var(--ink-body)"}}>Medium · DRS T4 + T9 viable · historic 1.2 overtakes per lap</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"flex-end",marginTop:18,gap:8}}>
        <button className="btn-ghost">Save Setup</button>
        <button className="btn-primary">ADVANCE TO QUALIFYING <span className="arrow">→</span></button>
      </div>

      <NavBar current="Pre-Race"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

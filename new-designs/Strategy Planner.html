<!DOCTYPE html>
<html lang="en" data-theme="broadcast">
<head>
<meta charset="UTF-8"/>
<title>Strategy — Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
<link rel="stylesheet" href="pages.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="atoms.jsx"></script>

<script type="text/babel">
const { useState, useMemo } = React;
const g = window.RACE_DATA;
const TOTAL = g.session.totalLaps;

function NavBar({ current }) {
  const links = [["index.html","Hub"],["Strategy Pre-Race.html","Pre-Race"],["Strategy Planner.html","Planner"],["Strategy Page.html","Live"],["Strategy Intel.html","Intel"],["Strategy Post-Race.html","Post"]];
  return (
    <div className="phase-switcher" style={{bottom:20,left:20}}>
      {links.map(([h,l])=>(<a key={h} href={h} style={{textDecoration:"none"}}><button className={current===l?"active":""}>{l}</button></a>))}
    </div>
  );
}

function GanttRow({ plan, onClick, selected }) {
  const stints = [];
  let prev = 0;
  stints.push({ compound: plan.startCompound, from: 0, to: plan.stops[0]?.lap ?? TOTAL });
  plan.stops.forEach((s, i) => {
    stints.push({ compound: s.compound, from: s.lap, to: plan.stops[i+1]?.lap ?? TOTAL });
  });
  return (
    <div className="gantt-row" onClick={onClick} style={{cursor:"pointer", background: selected ? "var(--bg-raised)" : undefined}}>
      <div className="gantt-label">
        <span className="gl-name">{plan.name}</span>
        <span className="gl-sub">{plan.recommended && <span className="rec">◆ RECOMMENDED · </span>}{plan.description}</span>
      </div>
      <div className="gantt-track">
        <div className="gantt-lap-marks">{Array.from({length:TOTAL}).map((_,i)=><div key={i} className="gantt-lap-mark"/>)}</div>
        {[0,10,20,30,40,50,TOTAL].map(l => (
          <div key={l} className="gantt-lap-label" style={{left:`${(l/TOTAL)*100}%`}}>L{l}</div>
        ))}
        {stints.map((s, i) => (
          <div key={i} className={`gantt-stint ${s.compound}`}
               style={{left:`${(s.from/TOTAL)*100}%`, width:`${((s.to-s.from)/TOTAL)*100}%`}}>
            {s.to - s.from}L
          </div>
        ))}
        {plan.stops.map((s, i) => (
          <React.Fragment key={i}>
            <div className="gantt-pit" style={{left:`${(s.lap/TOTAL)*100}%`}}/>
            <div className="gantt-pit-label" style={{left:`${(s.lap/TOTAL)*100}%`}}>◉ PIT L{s.lap}</div>
          </React.Fragment>
        ))}
      </div>
      <div className="gantt-confidence">
        <span className="pct">{plan.confidence}%</span>
        <span className={`risk ${plan.riskLevel === "low" ? "low" : plan.riskLevel === "medium" ? "med" : "hi"}`}>
          {plan.riskLevel.toUpperCase()}
        </span>
      </div>
    </div>
  );
}

function UndercutSim() {
  const [lead, setLead] = useState(42);
  const [rival, setRival] = useState(45);
  const gain = +((rival - lead) * 0.4 - 0.6).toFixed(1);
  const positive = gain > 0;

  // Build a simple position-vs-lap chart
  const laps = Array.from({length:20},(_,i)=>lead-5+i);
  const myLine = laps.map((l,i)=>{
    if (l < lead) return { l, y: 30 + i*0.8 };
    if (l === lead) return { l, y: 58 };
    return { l, y: 58 - (l-lead)*0.5 };
  });
  const rivalLine = laps.map((l,i)=>{
    if (l < rival) return { l, y: 32 + i*0.6 };
    if (l === rival) return { l, y: 55 };
    return { l, y: 55 - (l-rival)*0.5 };
  });
  const toPath = pts => pts.map((p,i)=>`${i===0?"M":"L"} ${((p.l - laps[0])/(laps.length-1))*100} ${p.y}`).join(" ");

  return (
    <div className="undercut-panel">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
        <div>
          <div className="planner-k">Undercut / Overcut Simulator</div>
          <div className="planner-t" style={{fontSize:24,marginTop:2}}>VSK vs OSR</div>
        </div>
        <div className="label">DRAG LAPS TO EXPLORE</div>
      </div>
      <div className="uc-grid">
        <div className="uc-col">
          <div className="uc-title">Your Pit Lap</div>
          <input type="range" min={30} max={50} value={lead} onChange={e=>setLead(+e.target.value)} style={{width:"100%",accentColor:"var(--sig-red)"}}/>
          <div className="label">LAP {lead} · SWITCH TO HARD</div>

          <div className="uc-title" style={{marginTop:10}}>Rival Pit Lap</div>
          <input type="range" min={30} max={50} value={rival} onChange={e=>setRival(+e.target.value)} style={{width:"100%",accentColor:"var(--sig-cyan)"}}/>
          <div className="label">LAP {rival} · OSR REACTIVE</div>
        </div>
        <div className="uc-col">
          <div className={`uc-result ${positive ? "" : "neg"}`}>
            <div>
              <div className="uc-label">Net Gap After Stops</div>
              <div className="label label-dim" style={{marginTop:4}}>{positive ? "UNDERCUT WORKS" : "OVERCUT WINS"}</div>
            </div>
            <div className="uc-val mono">{positive ? "+" : ""}{gain}s</div>
          </div>
          <div className="uc-chart">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none">
              <line x1="0" y1="50" x2="100" y2="50" stroke="var(--line-hair)"/>
              <path d={toPath(myLine)} fill="none" stroke="var(--sig-red)" strokeWidth="1.2" vectorEffect="non-scaling-stroke"/>
              <path d={toPath(rivalLine)} fill="none" stroke="var(--sig-cyan)" strokeWidth="1.2" vectorEffect="non-scaling-stroke"/>
            </svg>
          </div>
          <div style={{display:"flex",gap:14,fontFamily:"var(--font-mono)",fontSize:10,color:"var(--ink-mute)"}}>
            <span><span style={{color:"var(--sig-red)"}}>━━</span> VSK</span>
            <span><span style={{color:"var(--sig-cyan)"}}>━━</span> OSR</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const plans = [
    { id:"a", name:"PLAN A · Optimal", description:"Start MEDIUM, pit L42 → HARD · extend to flag", startCompound:"M", stops:[{lap:42,compound:"H"}], confidence:85, riskLevel:"low", recommended:true },
    { id:"b", name:"PLAN B · Undercut", description:"Aggressive early stop to jump RYNE ahead of traffic", startCompound:"M", stops:[{lap:36,compound:"H"}], confidence:68, riskLevel:"medium", recommended:false },
    { id:"c", name:"PLAN C · 2-Stop", description:"Soft opener, 2 stops, free air on fresh rubber", startCompound:"S", stops:[{lap:18,compound:"M"},{lap:40,compound:"S"}], confidence:55, riskLevel:"high", recommended:false },
    { id:"d", name:"PLAN D · Overcut", description:"Stay out, build gap, switch to SOFT for final 12L", startCompound:"M", stops:[{lap:45,compound:"S"}], confidence:48, riskLevel:"high", recommended:false },
  ];
  const [selected, setSelected] = useState("a");
  return (
    <div className="shell">
      <TopBar speed={1} setSpeed={()=>{}} paused={true} setPaused={()=>{}}/>
      <FlagStrip flag="GREEN" weather={g.weather}/>

      <div className="planner-head" style={{marginTop:14}}>
        <div className="planner-title-card">
          <div className="planner-k">STRATEGY LAB · #16 V. STERN · P1 ON GRID</div>
          <div className="planner-t">Race Strategy</div>
          <div className="planner-desc">57 laps · Monterra · compounds S·M·H · pit-loss ~22.4s · recommended window L36–L45</div>
        </div>
        <div className="panel">
          <div className="panel-head"><div className="ph-title">Driver Select</div><div className="ph-sub">2 OF 2</div></div>
          <div style={{padding:10,display:"flex",flexDirection:"column",gap:6}}>
            <button className="sim-btn active" style={{width:"100%",textAlign:"left",justifyContent:"flex-start"}}>#16 V. STERN · PLAN A</button>
            <button className="sim-btn" style={{width:"100%",textAlign:"left",justifyContent:"flex-start"}}>#88 S. RASK · PLAN B</button>
          </div>
        </div>
      </div>

      <div className="timeline-wrap" style={{marginBottom:14}}>
        <div className="timeline-head">
          <div className="ph-title">Pit Stop Timeline · 57 Laps</div>
          <div className="ph-sub">TAP PLAN TO SELECT</div>
        </div>
        <div className="timeline-labels">
          <div>PLAN</div><div style={{textAlign:"center"}}>TIMELINE (PIT LAPS)</div><div style={{textAlign:"right"}}>CONF · RISK</div>
        </div>
        {plans.map(p => (
          <GanttRow key={p.id} plan={p} selected={selected===p.id} onClick={()=>setSelected(p.id)}/>
        ))}
      </div>

      <UndercutSim/>

      <NavBar current="Planner"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

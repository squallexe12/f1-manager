<!DOCTYPE html>
<html lang="en" data-theme="broadcast">
<head>
<meta charset="UTF-8"/>
<title>Strategy — Post-Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
<link rel="stylesheet" href="pages.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="phases.jsx"></script>

<script type="text/babel">
const g = window.RACE_DATA;

function NavBar({ current }) {
  const links = [["index.html","Hub"],["Strategy Pre-Race.html","Pre-Race"],["Strategy Planner.html","Planner"],["Strategy Page.html","Live"],["Strategy Intel.html","Intel"],["Strategy Post-Race.html","Post"]];
  return (
    <div className="phase-switcher" style={{bottom:20,left:20}}>
      {links.map(([h,l])=>(<a key={h} href={h} style={{textDecoration:"none"}}><button className={current===l?"active":""}>{l}</button></a>))}
    </div>
  );
}

function StintRow({ code, team, stints, pts, pos }) {
  const t = window.teamOf(team);
  const total = stints.reduce((a,s)=>a+s.laps,0);
  return (
    <div className="stint-row" style={{borderLeft:`3px solid ${t.color}`}}>
      <div className="stint-drv">
        <div className="sc">{code}</div>
        <div className="st">P{pos} · {t.name.toUpperCase().slice(0,16)}</div>
      </div>
      <div className="stint-bar">
        {stints.map((s,i)=>(
          <div key={i} className={`stint-seg ${s.c}`} style={{width:`${(s.laps/total)*100}%`}}>{s.laps}L</div>
        ))}
      </div>
      <div className="stint-points">+{pts}</div>
    </div>
  );
}

function SwingRow({ code, delta, pos }) {
  const neg = delta < 0;
  const w = Math.min(Math.abs(delta)*3, 46);
  return (
    <div className="swing-bar-row">
      <div className="mono" style={{color:"var(--ink-hi)",fontWeight:700}}>{code}</div>
      <div className="swing-bar-track">
        <div className={`swing-bar-fill ${neg ? "neg" : ""}`} style={{width:`${w}%`}}/>
      </div>
      <div className="mono" style={{textAlign:"right",color: neg ? "var(--sig-red)" : "var(--sig-green)",fontWeight:700}}>
        {neg ? "" : "+"}{delta}
      </div>
    </div>
  );
}

function App() {
  const stints = [
    { code:"VSK", team:"NV", pos:1, pts:26, stints:[{c:"M",laps:22},{c:"H",laps:35}] },
    { code:"OSR", team:"AX", pos:2, pts:18, stints:[{c:"M",laps:20},{c:"H",laps:37}] },
    { code:"DLC", team:"AX", pos:3, pts:15, stints:[{c:"H",laps:30},{c:"M",laps:27}] },
    { code:"HAM", team:"MR", pos:4, pts:12, stints:[{c:"H",laps:28},{c:"M",laps:29}] },
    { code:"ALB", team:"VT", pos:6, pts:8, stints:[{c:"M",laps:18},{c:"M",laps:12},{c:"H",laps:27}] },
    { code:"PRZ", team:"KS", pos:7, pts:6, stints:[{c:"M",laps:16},{c:"H",laps:28},{c:"S",laps:13}] },
  ];
  const driverDelta = [
    { code:"STERN",    pre:82, post:108, dChange: 0, d:"+26", rank:"P2 → P1" },
    { code:"RYNE",     pre:94, post:112, dChange:-1, d:"+18", rank:"P1 → P2" },
    { code:"LACROIX",  pre:68, post:83,  dChange: 0, d:"+15", rank:"P3 → P3" },
    { code:"AMSEL",    pre:54, post:66,  dChange: 0, d:"+12", rank:"P4 → P4" },
    { code:"RIEVEN",   pre:52, post:62,  dChange: 1, d:"+10", rank:"P6 → P5" },
    { code:"LOBECK",   pre:44, post:52,  dChange:-1, d:"+8",  rank:"P5 → P6" },
  ];
  return (
    <div className="shell">
      <TopBar speed={1} setSpeed={()=>{}} paused={true} setPaused={()=>{}}/>
      <FlagStrip flag="RED" weather={g.weather}/>
      <PostRaceView/>

      <h3 className="label" style={{marginTop:28,marginBottom:10}}>◆ Stint Analysis · Final Classification</h3>
      <div className="stint-analysis">
        {stints.map(s => <StintRow key={s.code} {...s}/>)}
      </div>

      <div className="standings-wrap" style={{marginTop:14}}>
        <div className="standings-card">
          <div className="standings-head">Drivers Championship · Post-Round 07</div>
          {driverDelta.map((d,i)=>(
            <div key={i} className={`standings-row ${d.code==="STERN"?"player":""}`}>
              <div className="standings-pos">{i+1}</div>
              <div className={`standings-delta ${d.dChange>0?"up":d.dChange<0?"down":"same"}`}>
                {d.dChange>0?"▲":d.dChange<0?"▼":"—"}{d.dChange!==0?Math.abs(d.dChange):""}
              </div>
              <div className="standings-name">{d.code}</div>
              <div className="standings-pts">{d.post}</div>
              <div className="standings-pts-d">{d.d}</div>
            </div>
          ))}
        </div>
        <div className="standings-card">
          <div className="standings-head">Points Swing · Race</div>
          <div className="swing-bars">
            {[
              {code:"VSK",delta:+26,pos:1},
              {code:"OSR",delta:+18,pos:2},
              {code:"DLC",delta:+15,pos:3},
              {code:"HAM",delta:+12,pos:4},
              {code:"RIEVEN",delta:+10,pos:5},
              {code:"ALB",delta:+8,pos:6},
              {code:"RASK",delta:-4,pos:19},
            ].map(d => <SwingRow key={d.code} {...d}/>)}
          </div>
          <div className="standings-head" style={{borderTop:"1px solid var(--line-hair)"}}>Constructors Delta</div>
          <div className="swing-bars">
            {[
              {code:"NOVARA",delta:+22,pos:3},
              {code:"AXIOM",delta:+33,pos:1},
              {code:"MERIDIAN",delta:+12,pos:4},
              {code:"VERTEX",delta:+18,pos:2},
              {code:"KESTREL",delta:+6,pos:5},
            ].map(d => <SwingRow key={d.code} {...d}/>)}
          </div>
        </div>
      </div>

      <NavBar current="Post"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
